<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="Acesso ao Dashboard de Atendimentos Internos — restrito a e-mails @nossanet.net.br." />

	<!-- Credenciais do Supabase (mesmas do dashboard) -->
	<meta name="supabase-url" content="https://bnhftpeqmocrtrounehp.supabase.co" />
	<meta name="supabase-key" content="sb_publishable_ASQoX-jX2xY_aUGfVjkcjw_X85p16T4" />

	<title>Entrar — Dashboard de Atendimentos</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="assets/css/styles.css" />
	<link rel="stylesheet" href="assets/css/auth.css" />
</head>

<body>
	<div class="bg-shape bg-shape-1"></div>
	<div class="bg-shape bg-shape-2"></div>

	<div class="auth-shell">
		<div class="auth-card">
			<h1>Dashboard de Atendimentos</h1>

			<div class="auth-tabs" id="authTabs">
				<button type="button" class="auth-tab auth-tab--active" data-view="viewLogin">Entrar</button>
				<button type="button" class="auth-tab" data-view="viewCadastro">Cadastrar</button>
			</div>

			<p id="authMessage" class="auth-message"></p>

			<!-- LOGIN -->
			<form id="viewLogin" class="auth-view auth-view--active">
				<label class="auth-field">
					<span>E-mail corporativo</span>
					<input type="email" id="loginEmail" placeholder="usuario@nossanet.net.br" required autocomplete="username" />
				</label>
				<label class="auth-field">
					<span>Senha</span>
					<input type="password" id="loginSenha" placeholder="Sua senha" required autocomplete="current-password" />
				</label>
				<div class="auth-link-row">
					<button type="button" data-view="viewRecuperar">Esqueci minha senha</button>
				</div>
				<button type="submit" class="add-button auth-submit" id="btnLogin">Entrar</button>
			</form>

			<!-- CADASTRO -->
			<form id="viewCadastro" class="auth-view">
				<label class="auth-field">
					<span>E-mail corporativo</span>
					<input type="email" id="cadastroEmail" placeholder="usuario@nossanet.net.br" required autocomplete="username" />
				</label>
				<label class="auth-field">
					<span>Criar senha</span>
					<input type="password" id="cadastroSenha" placeholder="Mínimo 8 caracteres" required minlength="8"
						autocomplete="new-password" />
				</label>
				<label class="auth-field">
					<span>Confirmar senha</span>
					<input type="password" id="cadastroSenhaConfirma" placeholder="Repita a senha" required minlength="8"
						autocomplete="new-password" />
				</label>
				<button type="submit" class="add-button auth-submit" id="btnCadastro">Criar conta</button>
			</form>

			<!-- RECUPERAR SENHA -->
			<form id="viewRecuperar" class="auth-view">
				<label class="auth-field">
					<span>E-mail corporativo</span>
					<input type="email" id="recuperarEmail" placeholder="usuario@nossanet.net.br" required
						autocomplete="username" />
				</label>
				<p class="auth-hint">Enviaremos um link para você definir uma nova senha.</p>
				<button type="submit" class="add-button auth-submit" id="btnRecuperar">Enviar link de recuperação</button>
				<div class="auth-link-row">
					<button type="button" data-view="viewLogin">Voltar para o login</button>
				</div>
			</form>

			<!-- NOVA SENHA (aberta a partir do link do e-mail) -->
			<form id="viewNovaSenha" class="auth-view">
				<label class="auth-field">
					<span>Nova senha</span>
					<input type="password" id="novaSenha" placeholder="Mínimo 8 caracteres" required minlength="8"
						autocomplete="new-password" />
				</label>
				<label class="auth-field">
					<span>Confirmar nova senha</span>
					<input type="password" id="novaSenhaConfirma" placeholder="Repita a nova senha" required minlength="8"
						autocomplete="new-password" />
				</label>
				<button type="submit" class="add-button auth-submit" id="btnNovaSenha">Salvar nova senha</button>
			</form>
		</div>
	</div>

	<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
	<script src="assets/js/auth/login.js"></script>
</body>

</html>
